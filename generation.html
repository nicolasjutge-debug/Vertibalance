<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configuration - VertiBalance</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0a1628; color: white; text-align: center; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: #0d1d35; padding: 25px; border-radius: 12px; border: 2px solid #00C9A7; }
        button { background-color: #00C9A7; color: #0a1628; border: none; padding: 15px 30px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 18px; margin-top: 20px; }
        a { color: #00C9A7; font-size: 1.2em; font-weight: bold; text-decoration: none; }
        #status { margin-top: 20px; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Configuration</h1>
        <button id="btn-create-bin">Générer le Bin</button>
        <div id="status"></div>
    </div>
    <script>
        document.getElementById("btn-create-bin").addEventListener("click", () => {
            const status = document.getElementById("status");
            status.innerText = "Création en cours...";
            fetch("https://api.jsonbin.io/v3/b", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": "$2a$10$37WLUrV6lE8yluKasDN/nuzRMkF98j/gvrCuEj5KwNr0AuZkTPHnG",
                    "X-Bin-Private": "true"
                },
                body: JSON.stringify({ status: "initialisé" })
            })
            .then(r => r.json())
            .then(res => {
                localStorage.setItem("VERTIBALANCE_BIN_ID", res.metadata.id);
                status.innerHTML = "Bin créé avec succès !<br><br><a href='index.html'>Accéder à l'Interface Patient</a>";
            })
            .catch(err => {
                status.innerText = "Erreur : " + err.message;
            });
        });
    </script>
</body>
</html>
